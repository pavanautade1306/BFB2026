<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agritel | Crop Recommendation</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

    <nav class="sidebar">
        <div class="brand-header">
            <h2>🏛️ Agritel</h2>
            <p class="team-tag">Engineered by Valeriyan Scripts</p>
        </div>
        <ul>
            <li><a href="dashboard.html">📊 District Overview</a></li>
            <li class="active"><a href="recommendation.html">📜 Crop Recommendation</a></li>
            <li><a href="feedback.html">💬 Official Feedback</a></li>
            <li><a href="index.html" class="logout">🚪 Secure Logout</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <header class="section-header">
            <h1>Crop Decision Intelligence System</h1>
            <p>Input regional agronomic data to execute the high-accuracy viability algorithm.</p>
        </header>

        <div class="form-container">
            <form id="recommendation-form">
                <div class="input-grid">
                    <div class="input-group">
                        <label>Soil Type</label>
                        <select id="soil-type" required>
                            <option value="Clay">Clay</option>
                            <option value="Sandy">Sandy</option>
                            <option value="Loamy">Loamy</option>
                            <option value="Black Cotton">Black Cotton</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Annual Rainfall</label>
                        <select id="annual-rain" required>
                            <option value="Below 500mm">Below 500mm</option>
                            <option value="500–1000mm">500–1000mm</option>
                            <option value="Above 1000mm">Above 1000mm</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Temperature Range</label>
                        <select id="temp-range" required>
                            <option value="Below 20°C">Below 20°C</option>
                            <option value="20–30°C">20–30°C</option>
                            <option value="30–40°C">30–40°C</option>
                            <option value="Above 40°C">Above 40°C</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Water Source</label>
                        <select id="water-source" required>
                            <option value="Rain-fed">Rain-fed</option>
                            <option value="Irrigated">Irrigated</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Geographic Region</label>
                        <select id="region" required>
                            <option value="North India">North India</option>
                            <option value="South India">South India</option>
                            <option value="Central India">Central India</option>
                            <option value="Western India">Western India</option>
                            <option value="Eastern India">Eastern India</option>
                        </select>
                    </div>
                </div>

                <div class="divider"></div>

                <div class="input-grid">
                    <div class="input-group">
                        <label>Avg Nitrogen (kg/ha)</label>
                        <input type="number" id="nitrogen" placeholder="e.g., 90" required>
                    </div>
                    <div class="input-group">
                        <label>Avg Phosphorus (kg/ha)</label>
                        <input type="number" id="phosphorus" placeholder="e.g., 40" required>
                    </div>
                    <div class="input-group">
                        <label>Avg Potassium (kg/ha)</label>
                        <input type="number" id="potassium" placeholder="e.g., 40" required>
                    </div>
                    <div class="input-group">
                        <label>Soil pH Level</label>
                        <input type="number" step="0.1" id="ph" placeholder="e.g., 6.5" required>
                    </div>
                    <div class="input-group">
                        <label>Est. Crop Rainfall (mm)</label>
                        <input type="number" id="est-rain" placeholder="e.g., 200" required>
                    </div>
                </div>
                
                <button type="submit" class="btn-primary">Execute Data Model & Get Recommendation</button>
            </form>

            <div id="results-panel" class="results-panel" style="display: none;">
                <div class="primary-action">
                    <h2>SYSTEM DIRECTIVE</h2>
                    <h1 id="recommended-crop"></h1>
                </div>
                <p id="recommendation-reason" class="reason-text"></p>
            </div>
        </div>
    </main>

    <script src="main.js"></script>
</body>
</html>
