<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Crop Decision Intelligence System</title>
	<link rel="stylesheet" href="styles.css">
	<style>
		/* Minimal fallback styles in case styles.css fails to load */
		body{font-family:Segoe UI,Arial,Helvetica,sans-serif;margin:20px;background:#f7f9fc}
	</style>
</head>
<body>
	<header>
		<h1>Crop Decision Intelligence System</h1>
		<p>Enter environmental and market factors to get crop recommendations.</p>
	</header>

	<main>
		<section class="card">
			<h2>Inputs</h2>
			<form id="input-form">
				<div class="row">
					<label>Soil pH <input id="soil-ph" type="number" step="0.1" min="3" max="10" value="6.5"></label>
					<label>Soil Type
						<select id="soil-type">
							<option value="Loamy">Loamy</option>
							<option value="Sandy">Sandy</option>
							<option value="Clay">Clay</option>
						</select>
					</label>
				</div>

				<div class="row">
					<label>Annual Rainfall (mm) <input id="rainfall" type="number" value="800"></label>
					<label>Avg Temperature (°C) <input id="temp" type="number" step="0.1" value="25"></label>
				</div>

				<div class="row">
					<label>Irrigation Available
						<select id="irrigation">
							<option value="yes">Yes</option>
							<option value="no">No</option>
						</select>
					</label>
					<label>Market Price Importance
						<input id="market-weight" type="range" min="0" max="2" step="0.1" value="1">
					</label>
				</div>

				<div class="actions">
					<button type="submit">Recommend Crops</button>
					<button type="button" id="sample-btn">Use Sample Data</button>
				</div>
			</form>
		</section>

		<section class="card" id="results-card">
			<h2>Recommendations</h2>
			<div id="results">No recommendations yet. Submit inputs above.</div>
			<div id="chart" class="chart" aria-hidden="true"></div>
		</section>
	</main>

	<footer>
		<small>Demo: decision engine uses rule-based scoring and sample crop data.</small>
	</footer>

	<script src="script.js"></script>
</body>
</html>
