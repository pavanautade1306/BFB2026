<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KrishiMitra Gov | Secure Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

    <div class="login-container">
        <div class="gov-header">
            <div class="emblem">🏛️</div>
            <h1>Agrintel Portal</h1>
            <p class="subtitle">Chhatrapati Sambhajinagar Administration</p>
            <hr class="header-line">
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="empId">Official Employee ID</label>
                <input type="text" id="empId" placeholder="e.g. EMP-4092" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn-login">Secure Login</button>
        </form>

        <div class="gov-footer">
            <p>Authorized Personnel Only.</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
