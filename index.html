<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gov Login | AgriIntel Planning System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container">
        <div class="header">
            <h1>🏛️ AgriIntel Gov Portal</h1>
            <p>Data-Driven Insights for Regional Agricultural Planning</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Govt. Employee ID or Official Email</label>
                <input type="text" id="email" name="email" placeholder="e.g. EMP-4092 or @gov.in" required>
            </div>

            <div class="form-group">
                <label for="password">Secure Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn-login">Secure Login</button>
        </form>

        <div class="footer-links">
            <p><a href="#">Contact IT Admin</a></p>
            <p>Authorized Personnel Only</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
